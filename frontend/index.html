<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F19" />
    <title>RecruitAI</title>
    
    <!-- Pré-conexão com Google Fonts para melhor performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts: Inter (pesos 400, 500, 600, 700) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: #0B0F19;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #ffffff;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Scrollbar personalizada (elegante) */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      
      /* Loader inicial (inspirado nos dashboards Ref A/Ref B) */
      #root {
        animation: fadeIn 0.4s ease-out forwards;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0B0F19;
        z-index: 9999;
        transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
        font-family: 'Inter', sans-serif;
      }
      
      .initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loader-text {
        margin-top: 16px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Loader inicial (desaparece após React montar) -->
    <div id="initial-loader" class="initial-loader">
      <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="spinner"></div>
        <div class="loader-text">Carregando RecruitAI...</div>
      </div>
    </div>

    <div id="root"></div>
    
    <script>
      // Remove o loader assim que a React app estiver pronta
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hidden');
          // Remove do DOM após a transição
          setTimeout(() => {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 300);
        }
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
